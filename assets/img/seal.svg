<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sello de lacre Sendero">
  <defs>
    <radialGradient id="wax" cx="40%" cy="35%" r="72%">
      <stop offset="0%" stop-color="#4c5c41"/>
      <stop offset="55%" stop-color="#3a4632"/>
      <stop offset="100%" stop-color="#202a1a"/>
    </radialGradient>
    <radialGradient id="waxInner" cx="42%" cy="40%" r="62%">
      <stop offset="0%" stop-color="#414f37"/>
      <stop offset="100%" stop-color="#2a3422"/>
    </radialGradient>
    <filter id="blur1" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
  </defs>

  <!-- soft cast shadow under the wax -->
  <ellipse cx="102" cy="106" rx="90" ry="90" fill="#1a2014" opacity=".35" filter="url(#blur1)"/>

  <!-- molten wax blob (organic edge) -->
  <path d="M100,11
    C129,9 151,21 159,43
    C167,63 187,69 185,91
    C183,112 168,119 168,141
    C168,163 149,181 125,185
    C107,188 95,179 77,181
    C53,184 31,168 27,144
    C24,125 11,117 15,95
    C19,73 34,67 36,45
    C39,23 62,11 85,13
    C90,13 95,12 100,11 Z"
    fill="url(#wax)"/>

  <!-- top-left sheen -->
  <path d="M62,30 C46,38 36,52 36,68 C36,52 48,40 66,34 C58,30 62,30 62,30 Z"
    fill="#6a7a5a" opacity=".30" filter="url(#blur1)"/>

  <!-- pressed disc -->
  <circle cx="100" cy="100" r="66" fill="url(#waxInner)"/>
  <circle cx="100" cy="100" r="66" fill="none" stroke="#1e2616" stroke-width="2.5" opacity=".55"/>
  <circle cx="100" cy="100" r="62" fill="none" stroke="#5a6a4c" stroke-width="1" opacity=".35"/>

  <!-- embossed monogram (brand S) -->
  <g transform="translate(63,51) scale(0.80)">
    <!-- dark shadow copy -->
    <g transform="translate(1.3,1.6)" stroke="#1a2114" opacity=".7" fill="none" stroke-linecap="round">
      <path d="M58,16 C55,9 46,6 36,8 C22,12 14,22 18,33 C22,44 37,48 50,54 C62,60 70,68 67,79 C64,89 52,97 38,97 C26,97 17,91 15,83" stroke-width="4"/>
      <path d="M50,14 C44,28 36,46 28,64 C24,73 20,84 18,94" stroke-width="1.8"/>
      <path d="M50,14 C52,8 58,7 60,11" stroke-width="1.8"/>
    </g>
    <!-- light highlight copy -->
    <g transform="translate(-1,-1.2)" stroke="#79896a" opacity=".55" fill="none" stroke-linecap="round">
      <path d="M58,16 C55,9 46,6 36,8 C22,12 14,22 18,33 C22,44 37,48 50,54 C62,60 70,68 67,79 C64,89 52,97 38,97 C26,97 17,91 15,83" stroke-width="4"/>
      <path d="M50,14 C44,28 36,46 28,64 C24,73 20,84 18,94" stroke-width="1.8"/>
      <path d="M50,14 C52,8 58,7 60,11" stroke-width="1.8"/>
    </g>
    <!-- main face -->
    <g stroke="#36422d" fill="none" stroke-linecap="round">
      <path d="M58,16 C55,9 46,6 36,8 C22,12 14,22 18,33 C22,44 37,48 50,54 C62,60 70,68 67,79 C64,89 52,97 38,97 C26,97 17,91 15,83" stroke-width="4"/>
      <path d="M50,14 C44,28 36,46 28,64 C24,73 20,84 18,94" stroke-width="1.8"/>
      <path d="M50,14 C52,8 58,7 60,11" stroke-width="1.8"/>
    </g>
  </g>
</svg>
